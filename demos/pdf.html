<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PresupuestoPro — Generador de Presupuestos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f1f5f9;
      --white: #ffffff;
      --dark: #0f172a;
      --dark2: #1e293b;
      --mid: #475569;
      --soft: #94a3b8;
      --border: #e2e8f0;
      --accent: #0284c7;
      --accent2: #38bdf8;
      --accent-bg: #f0f9ff;
      --teal: #0f766e;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); font-size: 14px; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* ── HEADER ── */
    header {
      background: var(--dark); color: #fff;
      padding: 0 32px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .h-logo { display: flex; align-items: center; gap: 10px; }
    .h-logo-icon {
      width: 28px; height: 28px; border-radius: 7px; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
    }
    .h-logo-icon svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .h-logo-text { font-size: 15px; font-weight: 800; letter-spacing: -0.01em; }
    .h-logo-text span { color: rgba(255,255,255,0.35); font-weight: 400; font-size: 12px; margin-left: 8px; }
    .h-actions { display: flex; gap: 8px; }
    .h-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 7px; border: none;
      cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit;
      transition: all 0.15s;
    }
    .h-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .h-btn-ghost { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
    .h-btn-ghost:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .h-btn-primary { background: var(--accent); color: #fff; }
    .h-btn-primary:hover { background: #0369a1; }

    /* ── LAYOUT ── */
    .layout { display: grid; grid-template-columns: 440px 1fr; min-height: calc(100vh - 58px); }

    /* ── FORM PANEL ── */
    .form-panel {
      background: var(--white); border-right: 1px solid var(--border);
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .form-scroll { padding: 24px; flex: 1; }

    .form-section { margin-bottom: 20px; }
    .form-section-head {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
    }
    .form-section-icon {
      width: 28px; height: 28px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .form-section-icon svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .form-section-title { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .form-row.single { grid-template-columns: 1fr; }
    .fg { display: flex; flex-direction: column; gap: 5px; }
    .fg label { font-size: 11px; font-weight: 600; color: var(--mid); letter-spacing: 0.02em; }
    .fg input, .fg select, .fg textarea {
      padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 7px;
      font-size: 13px; font-family: inherit; background: var(--bg); color: var(--dark);
      outline: none; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .fg input:focus, .fg select:focus, .fg textarea:focus {
      border-color: var(--accent); background: var(--white);
      box-shadow: 0 0 0 3px rgba(2,132,199,0.08);
    }
    .fg input::placeholder, .fg textarea::placeholder { color: var(--soft); }

    /* ITEMS */
    .items-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
    .items-table th {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--soft); padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .items-table td { padding: 5px 4px; vertical-align: middle; }
    .item-input {
      width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 12px; font-family: inherit; background: var(--white); outline: none;
      transition: border-color 0.2s; color: var(--dark);
    }
    .item-input:focus { border-color: var(--accent); }
    .item-total-cell { font-size: 13px; font-weight: 700; color: var(--accent); padding: 8px; min-width: 80px; }
    .remove-btn {
      background: none; border: none; cursor: pointer; color: var(--soft);
      width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .remove-btn:hover { background: #fee2e2; color: #ef4444; }
    .remove-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
    .add-item-btn {
      width: 100%; padding: 9px; border: 1.5px dashed var(--border); border-radius: 7px;
      background: transparent; color: var(--soft); font-size: 12px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.15s; font-family: inherit;
    }
    .add-item-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .add-item-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; }

    .form-footer { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--white); }
    .gen-btn {
      width: 100%; background: var(--accent); color: #fff;
      border: none; padding: 14px; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.2s;
    }
    .gen-btn:hover { background: #0369a1; }
    .gen-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── PREVIEW PANEL ── */
    .preview-panel { padding: 28px; overflow-y: auto; background: var(--bg); }
    .preview-shell {
      background: var(--white); border-radius: 10px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      max-width: 680px; margin: 0 auto; overflow: hidden;
    }

    /* Document chrome */
    .doc-chrome {
      background: #1e293b; padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .doc-chrome-dots { display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .doc-chrome span { font-size: 11px; color: rgba(255,255,255,0.35); }
    .doc-chrome-action {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6); padding: 5px 12px; border-radius: 5px;
      font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; gap: 5px; transition: all 0.15s;
    }
    .doc-chrome-action:hover { background: rgba(255,255,255,0.14); color: #fff; }
    .doc-chrome-action svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    /* Document content */
    .doc { padding: 48px 52px; font-family: 'Inter', sans-serif; }

    .doc-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 36px; padding-bottom: 24px; border-bottom: 2px solid var(--border); }
    .doc-brand-name { font-size: 22px; font-weight: 900; letter-spacing: -0.03em; color: var(--dark); }
    .doc-brand-tag { font-size: 12px; color: var(--soft); margin-top: 3px; }
    .doc-brand-contact { font-size: 11.5px; color: var(--mid); margin-top: 10px; line-height: 1.7; }

    .doc-right { text-align: right; }
    .doc-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .doc-number { font-size: 28px; font-weight: 900; color: var(--dark); letter-spacing: -0.03em; line-height: 1; }
    .doc-date { font-size: 12px; color: var(--soft); margin-top: 6px; }
    .doc-validity-pill {
      display: inline-block; margin-top: 8px;
      background: #fefce8; color: #a16207; border: 1px solid #fde68a;
      font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
    }

    .doc-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .doc-party { background: #f8fafc; border-radius: 8px; padding: 14px 16px; border: 1px solid var(--border); }
    .doc-party-label { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--soft); margin-bottom: 8px; }
    .doc-party-name { font-size: 14px; font-weight: 800; color: var(--dark); margin-bottom: 4px; }
    .doc-party-detail { font-size: 11.5px; color: var(--mid); line-height: 1.6; }

    .doc-desc-block { background: var(--accent-bg); border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 0 6px 6px 0; margin-bottom: 24px; font-size: 13px; color: var(--mid); line-height: 1.6; }

    .doc-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    .doc-table thead tr { background: var(--dark); }
    .doc-table th { padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.7); }
    .doc-table th:last-child { text-align: right; }
    .doc-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--mid); }
    .doc-table tbody tr:nth-child(even) td { background: #f8fafc; }
    .doc-table .num { text-align: center; font-variant-numeric: tabular-nums; }
    .doc-table .right { text-align: right; font-variant-numeric: tabular-nums; }
    .doc-table .right.bold { font-weight: 700; color: var(--dark); }

    .doc-totals { display: flex; justify-content: flex-end; margin-bottom: 28px; }
    .totals-box { width: 260px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .total-row { display: flex; justify-content: space-between; padding: 10px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
    .total-row:last-child { border-bottom: none; background: var(--dark); color: #fff; }
    .total-row .label { color: var(--mid); }
    .total-row.grand .label { color: rgba(255,255,255,0.7); font-weight: 600; }
    .total-row.grand .val { font-size: 17px; font-weight: 900; color: var(--accent2); }

    .doc-notes-block { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 28px; }
    .doc-notes-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--soft); margin-bottom: 8px; }
    .doc-notes-body { font-size: 12.5px; color: var(--mid); line-height: 1.7; }

    .doc-footer { text-align: center; padding-top: 20px; border-top: 1px solid var(--border); }
    .doc-footer p { font-size: 11px; color: var(--soft); line-height: 1.8; }
    .doc-footer strong { color: var(--accent); font-weight: 600; }

    /* DEPLY BADGE */
    .deply-badge {
      position: fixed; bottom: 24px; right: 24px;
      background: #0a0a0a; color: #c8a96e;
      padding: 9px 18px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      font-family: 'Courier New', monospace; z-index: 500;
      border: 1px solid rgba(200,169,110,0.3); text-decoration: none; border-radius: 4px;
    }
    .deply-badge span { color: #fff; }

    @media print {
      header, .form-panel, .doc-chrome, .deply-badge { display: none !important; }
      .layout { display: block; }
      .preview-panel { padding: 0; background: #fff; }
      .preview-shell { box-shadow: none; border-radius: 0; max-width: 100%; }
      .doc { padding: 18mm 22mm; }
    }
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .form-panel { border-right: none; border-bottom: 1px solid var(--border); max-height: 55vh; }
      .doc { padding: 28px 32px; }
    }
    @media (max-width: 640px) {
      header { padding: 0 16px; }
      .h-logo-text span { display: none; }
      .preview-panel { padding: 16px; }
      .doc { padding: 20px 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="h-logo">
    <div class="h-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </div>
    <div class="h-logo-text">PresupuestoPro <span>Construcción & Refacciones</span></div>
  </div>
  <div class="h-actions">
    <button class="h-btn h-btn-ghost" onclick="resetForm()">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
      Nuevo
    </button>
    <button class="h-btn h-btn-primary" onclick="window.print()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Descargar PDF
    </button>
  </div>
</header>

<div class="layout">
  <!-- FORM -->
  <div class="form-panel">
    <div class="form-scroll">

      <!-- Tu empresa -->
      <div class="form-section">
        <div class="form-section-head">
          <div class="form-section-icon" style="background:#f0f9ff;color:var(--accent)">
            <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          </div>
          <span class="form-section-title" style="color:var(--accent)">Tu empresa</span>
        </div>
        <div class="form-row">
          <div class="fg" style="grid-column:1/-1"><label>Nombre de la empresa</label><input id="empresa" type="text" placeholder="Construcciones Rodríguez S.R.L." oninput="update()"></div>
        </div>
        <div class="form-row">
          <div class="fg"><label>Teléfono</label><input id="tel" type="text" placeholder="+54 9 351 000-0000" oninput="update()"></div>
          <div class="fg"><label>Email</label><input id="email" type="text" placeholder="info@empresa.com" oninput="update()"></div>
        </div>
        <div class="form-row single">
          <div class="fg"><label>Rubro / Especialidad</label><input id="rubro" type="text" placeholder="Construcción y Refacciones" oninput="update()"></div>
        </div>
      </div>

      <!-- Cliente -->
      <div class="form-section">
        <div class="form-section-head">
          <div class="form-section-icon" style="background:#f0fdf4;color:#16a34a">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <span class="form-section-title" style="color:#16a34a">Cliente</span>
        </div>
        <div class="form-row">
          <div class="fg"><label>Nombre</label><input id="clienteNombre" type="text" placeholder="María González" oninput="update()"></div>
          <div class="fg"><label>Teléfono</label><input id="clienteTel" type="text" placeholder="+54 9 351 111-1111" oninput="update()"></div>
        </div>
        <div class="form-row single">
          <div class="fg"><label>Dirección de obra</label><input id="clienteDir" type="text" placeholder="Bv. Los Andes 2340, Córdoba" oninput="update()"></div>
        </div>
      </div>

      <!-- Trabajo -->
      <div class="form-section">
        <div class="form-section-head">
          <div class="form-section-icon" style="background:#faf5ff;color:#9333ea">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
          <span class="form-section-title" style="color:#9333ea">Descripción del trabajo</span>
        </div>
        <div class="form-row single">
          <div class="fg">
            <label>Descripción general</label>
            <textarea id="descripcion" rows="2" placeholder="Refacción integral de baño: demolición, plomería, revestimientos y pintura." oninput="update()"></textarea>
          </div>
        </div>
      </div>

      <!-- Ítems -->
      <div class="form-section">
        <div class="form-section-head">
          <div class="form-section-icon" style="background:#fff7ed;color:#ea580c">
            <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <span class="form-section-title" style="color:#ea580c">Ítems y precios</span>
        </div>
        <table class="items-table">
          <thead>
            <tr>
              <th style="width:42%">Descripción</th>
              <th style="width:13%">Cant.</th>
              <th style="width:22%">P. unitario</th>
              <th style="width:16%">Total</th>
              <th style="width:7%"></th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
        <button class="add-item-btn" onclick="addItem()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Agregar ítem
        </button>
      </div>

      <!-- Condiciones -->
      <div class="form-section">
        <div class="form-section-head">
          <div class="form-section-icon" style="background:#f8fafc;color:var(--mid)">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <span class="form-section-title" style="color:var(--mid)">Condiciones</span>
        </div>
        <div class="form-row">
          <div class="fg">
            <label>IVA</label>
            <select id="iva" onchange="update()">
              <option value="0">Sin IVA</option>
              <option value="10.5">10.5%</option>
              <option value="21" selected>21%</option>
            </select>
          </div>
          <div class="fg">
            <label>Validez del presupuesto</label>
            <select id="validez" onchange="update()">
              <option value="15 días hábiles">15 días hábiles</option>
              <option value="30 días hábiles" selected>30 días hábiles</option>
              <option value="60 días hábiles">60 días hábiles</option>
            </select>
          </div>
        </div>
        <div class="form-row single">
          <div class="fg">
            <label>Notas / condiciones de pago</label>
            <textarea id="notas" rows="2" placeholder="50% al inicio de obra, 50% a la entrega." oninput="update()"></textarea>
          </div>
        </div>
      </div>

    </div>
    <div class="form-footer">
      <button class="gen-btn" onclick="window.print()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Generar y descargar PDF
      </button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <div class="preview-shell">
      <div class="doc-chrome">
        <div class="doc-chrome-dots">
          <div class="dot" style="background:#ef4444"></div>
          <div class="dot" style="background:#f59e0b"></div>
          <div class="dot" style="background:#22c55e"></div>
        </div>
        <span>Vista previa · actualización en tiempo real</span>
        <button class="doc-chrome-action" onclick="window.print()">
          <svg viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Imprimir / PDF
        </button>
      </div>
      <div class="doc" id="docPreview"></div>
    </div>
  </div>
</div>

<a href="../index.html" class="deply-badge"><span>Deply</span> Co. — Demo</a>

<script>
  let items = [
    { desc:'Demolición y retiro de escombros', qty:1, price:85000 },
    { desc:'Mano de obra — plomería completa',  qty:1, price:120000 },
    { desc:'Revestimiento cerámico (m²)',       qty:12, price:8500 },
    { desc:'Pintura látex interior (lt)',        qty:3, price:14000 },
  ];

  let docNum = 'PRO-' + String(Math.floor(Math.random()*900+100)).padStart(4,'0');

  function fmt(n) {
    return '$ ' + Number(n).toLocaleString('es-AR', { minimumFractionDigits:0, maximumFractionDigits:0 });
  }

  function renderItems() {
    document.getElementById('itemsBody').innerHTML = items.map((it, i) => `
      <tr>
        <td><input class="item-input" value="${it.desc}" oninput="items[${i}].desc=this.value;update()" placeholder="Descripción del ítem"></td>
        <td><input class="item-input" type="number" style="text-align:center" value="${it.qty}" min="0" oninput="items[${i}].qty=+this.value;update()"></td>
        <td><input class="item-input" type="number" value="${it.price}" oninput="items[${i}].price=+this.value;update()"></td>
        <td class="item-total-cell">${fmt(it.qty * it.price)}</td>
        <td>
          <button class="remove-btn" onclick="removeItem(${i})">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </td>
      </tr>
    `).join('');
  }

  function addItem() {
    items.push({ desc:'', qty:1, price:0 });
    renderItems(); update();
    const inputs = document.querySelectorAll('#itemsBody .item-input');
    inputs[inputs.length - 3].focus();
  }

  function removeItem(i) {
    items.splice(i, 1);
    renderItems(); update();
  }

  function g(id) { return document.getElementById(id)?.value || ''; }

  function update() {
    const subtotal = items.reduce((s, it) => s + it.qty * it.price, 0);
    const ivaRate = parseFloat(g('iva')) || 0;
    const ivaAmt = subtotal * ivaRate / 100;
    const total = subtotal + ivaAmt;
    const today = new Date().toLocaleDateString('es-AR', { day:'2-digit', month:'long', year:'numeric' });
    const empresa = g('empresa') || 'Tu Empresa';

    document.getElementById('docPreview').innerHTML = `
      <div class="doc-head">
        <div>
          <div class="doc-brand-name">${empresa}</div>
          <div class="doc-brand-tag">${g('rubro') || 'Construcción & Refacciones'}</div>
          <div class="doc-brand-contact">${g('tel') || '+54 9 351 000-0000'}<br>${g('email') || 'info@empresa.com'}</div>
        </div>
        <div class="doc-right">
          <div class="doc-label">Presupuesto</div>
          <div class="doc-number">${docNum}</div>
          <div class="doc-date">Emitido: ${today}</div>
          <div class="doc-validity-pill">Válido por ${g('validez') || '30 días hábiles'}</div>
        </div>
      </div>

      <div class="doc-parties">
        <div class="doc-party">
          <div class="doc-party-label">Empresa</div>
          <div class="doc-party-name">${empresa}</div>
          <div class="doc-party-detail">${g('email') || '—'}<br>${g('tel') || '—'}</div>
        </div>
        <div class="doc-party">
          <div class="doc-party-label">Cliente</div>
          <div class="doc-party-name">${g('clienteNombre') || 'Nombre del Cliente'}</div>
          <div class="doc-party-detail">${g('clienteDir') || '—'}<br>${g('clienteTel') || '—'}</div>
        </div>
      </div>

      ${g('descripcion') ? `<div class="doc-desc-block">${g('descripcion')}</div>` : ''}

      <table class="doc-table">
        <thead>
          <tr>
            <th>Descripción</th>
            <th class="num">Cant.</th>
            <th class="right">P. Unit.</th>
            <th class="right">Total</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(it => `
            <tr>
              <td>${it.desc || '—'}</td>
              <td class="num">${it.qty}</td>
              <td class="right">${fmt(it.price)}</td>
              <td class="right bold">${fmt(it.qty * it.price)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>

      <div class="doc-totals">
        <div class="totals-box">
          <div class="total-row"><span class="label">Subtotal</span><span>${fmt(subtotal)}</span></div>
          ${ivaRate > 0 ? `<div class="total-row"><span class="label">IVA ${ivaRate}%</span><span>${fmt(ivaAmt)}</span></div>` : ''}
          <div class="total-row grand"><span class="label">TOTAL</span><span class="val">${fmt(total)}</span></div>
        </div>
      </div>

      ${g('notas') ? `
        <div class="doc-notes-block">
          <div class="doc-notes-title">Condiciones de pago</div>
          <div class="doc-notes-body">${g('notas')}</div>
        </div>
      ` : ''}

      <div class="doc-footer">
        <p>Presupuesto emitido por <strong>${empresa}</strong> el ${today}</p>
        <p>Este documento tiene validez por <strong>${g('validez') || '30 días hábiles'}</strong> a partir de la fecha de emisión.</p>
      </div>
    `;
  }

  function resetForm() {
    if (!confirm('¿Crear un nuevo presupuesto? Se perderán los datos actuales.')) return;
    docNum = 'PRO-' + String(Math.floor(Math.random()*900+100)).padStart(4,'0');
    ['empresa','rubro','tel','email','clienteNombre','clienteTel','clienteDir','descripcion','notas'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
    items = [{ desc:'', qty:1, price:0 }];
    renderItems(); update();
  }

  renderItems();
  update();
</script>
</body>
</html>
